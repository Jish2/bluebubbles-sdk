# OpenAPI Generator configuration for Swift 5
# Generator docs: https://openapi-generator.tech/docs/generators/swift5
#
# To regenerate:
#   ./scripts/generate.sh swift

generatorName: swift5
inputSpec: ../../openapi.yaml
outputDir: ../../sdks/swift

additionalProperties:
  projectName: BlueBubblesSDK
  podVersion: "1.0.0"
  podHomepage: "https://github.com/BlueBubblesApp/bluebubbles-sdk"
  library: urlsession
  swiftPackagePath: Sources/BlueBubblesSDK
  useBacktickEscapes: true

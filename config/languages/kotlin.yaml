# OpenAPI Generator configuration for Kotlin
# Generator docs: https://openapi-generator.tech/docs/generators/kotlin
#
# To regenerate:
#   ./scripts/generate.sh kotlin

generatorName: kotlin
inputSpec: ../../openapi.yaml
outputDir: ../../sdks/kotlin

additionalProperties:
  groupId: com.bluebubbles
  artifactId: sdk
  artifactVersion: "1.0.0"
  packageName: com.bluebubbles.sdk
  library: jvm-retrofit2
  useCoroutines: true
  serializationLibrary: gson

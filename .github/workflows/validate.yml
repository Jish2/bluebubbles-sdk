name: Validate OpenAPI Spec

on:
  pull_request:
    paths:
      - "openapi.yaml"
      - "config/languages/**"

jobs:
  validate:
    name: Validate spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate openapi.yaml
        run: |
          npx --yes @openapitools/openapi-generator-cli validate -i openapi.yaml

      - name: Dry-run generation (no output)
        run: |
          for config in config/languages/*.yaml; do
            lang=$(basename "$config" .yaml)
            echo "Dry-run: $lang"
            npx @openapitools/openapi-generator-cli generate \
              -c "$config" \
              --dry-run \
              --skip-validate-spec \
              -o /tmp/dryrun-"$lang" \
            && echo "  OK" || echo "  FAILED: $lang"
          done
